[main]
font=JetBrainsMono Nerd Font:size=11:style=Bold
pad=15x15

[cursor]
style=block
color=2d2621 b35d5d
blink=yes

[colors]
# 1. Transparenz-Fix: 0.92 statt 0.85 (weniger Durchscheinen = sattere Farben)
alpha=0.92
background=2d2621
foreground=b9b19c

## Sattere, kräftigere Farben für mehr "Punch"
regular0=3d3530  # Coffee Light
regular1=cc4a4a  # Kräftigeres Rot (Burgundy mit mehr Sättigung)
regular2=98bb6c  # Sattes Matcha-Grün (deutlich lebendiger)
regular3=dca561  # Warmes Gold/Orange (Caramel Punch)
regular4=51a2da  # Sattes Fedora-Blau (Damit das Logo knallt!) <-- WICHTIG
regular5=957fb8  # Deep Plum (Violetter Akzent)
regular6=7aa89f  # Sattes Teal
regular7=b9b19c  # Cream Beige

## Die "Bright"-Stufe für richtiges Aufleuchten (z.B. im Fastfetch)
bright0=5c4f47
bright1=ff5d5d   # Richtig leuchtendes Rot
bright2=b1e381   # Leuchtendes Grün
bright3=ff9e3b   # Kräftiges Orange
bright4=73c1ff   # Helles, strahlendes Blau (für den Logo-Glanz)
bright5=d183e8   # Bright Magenta
bright6=a3d4d5   # Bright Cyan
bright7=f5ebd0   # Pure Cream